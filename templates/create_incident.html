{% extends "base.html" %}

{% block content %}
<h2>Create Incident</h2>

<form method="post" class="form-card">
    <label>Title</label>
    <input type="text" name="title" required>

    <label>Description</label>
    <textarea name="description"></textarea>

    <label>Incident Type</label>
    <input type="text" name="incident_type" placeholder="phishing, malware, vulnerability" required>

    <label>Status</label>
    <select name="status">
        <option value="new">new</option>
        <option value="triaged">triaged</option>
        <option value="investigating">investigating</option>
        <option value="resolved">resolved</option>
        <option value="closed">closed</option>
    </select>

    <label>Severity (1-5)</label>
    <input type="number" name="severity" min="1" max="5" required>

    <label>Reporter</label>
    <select name="reporter_id" required>
        {% for user in users %}
        <option value="{{ user.user_id }}">{{ user.name }} ({{ user.role }})</option>
        {% endfor %}
    </select>

    <label>Assign To</label>
    <select name="assignee_id">
        <option value="">Unassigned</option>
        {% for user in users %}
        <option value="{{ user.user_id }}">{{ user.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Create Incident</button>
</form>
{% endblock %}
